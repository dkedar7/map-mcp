<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f2e2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint map grid motif -->
  <g stroke="#1e3a35" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <circle cx="600" cy="320" r="9" fill="#14b8a6"/><circle cx="905" cy="162" r="9" fill="#14b8a6"/>

  <text x="80" y="150" fill="#5eead4" font-size="26" font-family="monospace" letter-spacing="2">MCP · MapLibre GL</text>
  <text x="78" y="250" fill="#f8fafc" font-size="92" font-weight="800">map-mcp</text>
  <text x="80" y="320" fill="#e2e8f0" font-size="36" font-weight="600">Drive a live map from an AI agent.</text>
  <text x="80" y="372" fill="#94a3b8" font-size="26">Query rendered features, read the viewport, click and read popups —</text>
  <text x="80" y="408" fill="#94a3b8" font-size="26">over MCP. No browser automation. No test code.</text>

  <!-- three pills -->
  <g font-size="22" font-weight="600">
    <rect x="80" y="468" width="200" height="58" rx="29" fill="#0b3b34" stroke="#14b8a6"/>
    <text x="180" y="505" fill="#5eead4" text-anchor="middle">perceive</text>
    <rect x="300" y="468" width="160" height="58" rx="29" fill="#1e293b" stroke="#475569"/>
    <text x="380" y="505" fill="#e2e8f0" text-anchor="middle">drive</text>
    <rect x="480" y="468" width="240" height="58" rx="29" fill="#172554" stroke="#3b82f6"/>
    <text x="600" y="505" fill="#93c5fd" text-anchor="middle">human = agent</text>
  </g>

  <text x="80" y="585" fill="#64748b" font-size="22" font-family="monospace">uvx map-mcp  ·  github.com/dkedar7/map-mcp  ·  MIT</text>
</svg>
