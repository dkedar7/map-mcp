<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1000" height="440" fill="#0f172a"/>
  <text x="40" y="56" fill="#f8fafc" font-size="30" font-weight="700">map-mcp</text>
  <text x="40" y="84" fill="#94a3b8" font-size="16">An agent and a human drive the same live MapLibre map — parity by construction.</text>

  <!-- Browser group -->
  <rect x="40" y="120" width="300" height="250" rx="14" fill="#1e293b" stroke="#334155"/>
  <text x="60" y="148" fill="#cbd5e1" font-size="13" letter-spacing="1">BROWSER · YOUR LIVE SESSION</text>
  <rect x="64" y="168" width="252" height="84" rx="10" fill="#0b3b34" stroke="#14b8a6"/>
  <text x="80" y="200" fill="#5eead4" font-size="17" font-weight="600">MapLibre GL map</text>
  <text x="80" y="224" fill="#99f6e4" font-size="13" font-family="monospace">the map you're looking at</text>
  <rect x="64" y="266" width="252" height="80" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="80" y="296" fill="#e2e8f0" font-size="16" font-weight="600">map-mcp hook</text>
  <text x="80" y="320" fill="#94a3b8" font-size="13" font-family="monospace">one &lt;script&gt; line, opt-in</text>

  <!-- WS link -->
  <text x="360" y="232" fill="#fbbf24" font-size="12" font-family="monospace">WebSocket</text>
  <text x="358" y="250" fill="#94a3b8" font-size="11" font-family="monospace">127.0.0.1 + token</text>
  <line x1="340" y1="262" x2="430" y2="262" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#a)" marker-start="url(#a)"/>

  <!-- map-mcp process -->
  <rect x="430" y="120" width="330" height="250" rx="14" fill="#1e293b" stroke="#334155"/>
  <text x="450" y="148" fill="#cbd5e1" font-size="13" letter-spacing="1">map-mcp PROCESS (Python)</text>
  <rect x="452" y="166" width="286" height="46" rx="9" fill="#1e293b" stroke="#475569"/>
  <text x="468" y="194" fill="#e2e8f0" font-size="15">bridge · correlates requests by id</text>
  <rect x="452" y="222" width="286" height="46" rx="9" fill="#3b2f0b" stroke="#f59e0b"/>
  <text x="468" y="250" fill="#fcd34d" font-size="15" font-weight="600">core-ops · one implementation</text>
  <rect x="452" y="288" width="138" height="62" rx="9" fill="#1e293b" stroke="#475569"/>
  <text x="468" y="314" fill="#e2e8f0" font-size="14">MCP server</text>
  <text x="468" y="334" fill="#94a3b8" font-size="12" font-family="monospace">stdio · HTTP</text>
  <rect x="600" y="288" width="138" height="62" rx="9" fill="#1e293b" stroke="#475569"/>
  <text x="616" y="314" fill="#e2e8f0" font-size="14">CLI</text>
  <text x="616" y="334" fill="#94a3b8" font-size="12" font-family="monospace">map-mcp call ...</text>
  <line x1="595" y1="212" x2="595" y2="222" stroke="#64748b" stroke-width="2" marker-end="url(#g)"/>
  <line x1="521" y1="268" x2="521" y2="288" stroke="#64748b" stroke-width="2" marker-end="url(#g)"/>
  <line x1="669" y1="268" x2="669" y2="288" stroke="#64748b" stroke-width="2" marker-end="url(#g)"/>

  <!-- consumers -->
  <rect x="820" y="200" width="150" height="50" rx="10" fill="#172554" stroke="#3b82f6"/>
  <text x="840" y="231" fill="#93c5fd" font-size="16" font-weight="600">AI agent</text>
  <rect x="820" y="288" width="150" height="50" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="840" y="319" fill="#e2e8f0" font-size="16" font-weight="600">you (human)</text>
  <line x1="820" y1="225" x2="760" y2="312" stroke="#3b82f6" stroke-width="2" marker-end="url(#b)"/>
  <line x1="820" y1="313" x2="745" y2="320" stroke="#64748b" stroke-width="2" marker-end="url(#g)"/>

  <text x="40" y="412" fill="#64748b" font-size="13" font-family="monospace">perceive: get_viewport · query_rendered_features · click_at · read_popup    drive: set_view · list_layers · set_layer_visibility</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#fbbf24"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3b82f6"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#64748b"/></marker>
  </defs>
</svg>
